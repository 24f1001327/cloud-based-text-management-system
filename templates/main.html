<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmonix Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

  <header class="header">
    <div class="logo">🚀 Cosmonix</div>
    <nav>
      <a href="#">Home</a>
      <a href="{{ url_for('education_home') }}">Education</a>
      <a href="#">Settings</a>
      <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </nav>
  </header>

  <main class="main">
    <h1>Welcome, {{ session['username'] }}!</h1>
    <p>Run your first simulation below:</p>

    <form class="sim-form" method="POST" action="/run-simulation">
      <label for="param">Enter Simulation Parameter (n):</label>
      <input type="number" id="param" name="param" min="10" value="100" required>
      <button type="submit">Run Simulation</button>
    </form>
  </main>

  <footer class="footer">
    <p>&copy; 2025 Cosmonix. All Rights Reserved.</p>
  </footer>

</body>
</html>
